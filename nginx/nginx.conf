server {
    listen 80;
    server_name _;

    # If nginx is the public edge, terminate CORS in FastAPI only to avoid drift.
    real_ip_header X-Forwarded-For;
    set_real_ip_from 127.0.0.1;
    
    # Redirect HTTP to HTTPS (uncomment for production with SSL)
    # return 301 https://$server_name$request_uri;
    
    # Backend API
    location /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # Health checks
    location /health {
        proxy_pass http://localhost:8000/health;
        access_log off;
    }

    location /ready {
        proxy_pass http://localhost:8000/ready;
        access_log off;
    }

    location /live {
        proxy_pass http://localhost:8000/live;
        access_log off;
    }

    location /metrics {
        proxy_pass http://localhost:8000/metrics;
        allow 127.0.0.1;
        deny all;
    }
    
    # API Documentation
    location /docs {
        proxy_pass http://localhost:8000/docs;
    }
    
    # Rate limiting (optional)
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    # limit_req zone=api_limit burst=5 nodelay;
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

