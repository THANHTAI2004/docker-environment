services:
  redis:
    image: redis:7-alpine
    container_name: wearable-redis
    network_mode: host
    restart: unless-stopped

  # Avahi mDNS Service Discovery
  avahi:
    image: flungo/avahi
    container_name: avahi-mdns
    network_mode: host
    environment:
      - SERVER_HOST_NAME=health-monitor
      - AVAHI_SERVICES=http:8000:tcp
    volumes:
      - /var/run/dbus:/var/run/dbus
    restart: unless-stopped

  mongodb:
    image: mongo:8.2.5
    container_name: mongodb
    network_mode: host
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wearable-backend
    network_mode: host
    environment:
      - MONGO_URI=mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@localhost:27017
      - MONGO_DB=${MONGO_DB:-wearable}
      - DEVICE_TOKEN_SECRET=${DEVICE_TOKEN_SECRET:?DEVICE_TOKEN_SECRET is required}
      - API_KEY=${API_KEY:?API_KEY is required}
      - ADMIN_API_KEY=${ADMIN_API_KEY:?ADMIN_API_KEY is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-https://app.eldercare.io.vn,https://admin.eldercare.io.vn,http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000}
      - CORS_ALLOW_ORIGIN_REGEX=${CORS_ALLOW_ORIGIN_REGEX-}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_STORAGE=${RATE_LIMIT_STORAGE:-redis}
      - RATE_LIMIT_GENERAL_PER_MINUTE=${RATE_LIMIT_GENERAL_PER_MINUTE:-300}
      - RATE_LIMIT_ESP_PER_MINUTE=${RATE_LIMIT_ESP_PER_MINUTE:-1200}
      - REDIS_URL=${REDIS_URL:-redis://127.0.0.1:6379/0}
      - COMMAND_TTL_SECONDS=${COMMAND_TTL_SECONDS:-300}
      - EXPOSE_API_DOCS=${EXPOSE_API_DOCS:-false}
      - EXPOSE_METRICS=${EXPOSE_METRICS:-false}
      - METRICS_TOKEN=${METRICS_TOKEN-}
      - ALLOW_ADMIN_API_KEY_BOOTSTRAP=${ALLOW_ADMIN_API_KEY_BOOTSTRAP:-false}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      - mongodb
      - redis

  nodered:
    image: nodered/node-red:4.1.7-debian
    container_name: nodered
    network_mode: host
    environment:
      - TZ=UTC
    volumes:
      - nodered_data:/data
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    depends_on:
      - mongodb
    profiles:
      - tools

volumes:
  nodered_data:
  mongodb_data:
  mongodb_config:
