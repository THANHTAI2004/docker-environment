# Production Docker Compose Configuration
# Use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    restart: unless-stopped
    # Use root .env values injected through docker-compose.yml.
    # Avoid loading backend/.env in production to reduce secret sprawl.
    # Remove source bind-mount in production so container runs immutable image.
    volumes: !reset []
    environment:
      - LOG_LEVEL=WARNING
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongodb:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    # Run named tunnel by default in production override.
    profiles: []
