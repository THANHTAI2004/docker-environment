services:
  redis:
    image: redis:7-alpine
    container_name: wearable-redis
    restart: unless-stopped
    ports:
      - "${REDIS_BIND_IP:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:8.2.5
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
    ports:
      - "${MONGO_BIND_IP:-127.0.0.1}:${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wearable-backend
    environment:
      - MONGO_URI=mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongodb:27017
      - MONGO_DB=wearable
      - DEVICE_TOKEN_SECRET=${DEVICE_TOKEN_SECRET:?DEVICE_TOKEN_SECRET is required}
      - API_KEY=${API_KEY:?API_KEY is required}
      - ADMIN_API_KEY=${ADMIN_API_KEY:?ADMIN_API_KEY is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET is required}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-https://app.eldercare.io.vn,https://admin.eldercare.io.vn,http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000}
      - CORS_ALLOW_ORIGIN_REGEX=${CORS_ALLOW_ORIGIN_REGEX:-^https?://(localhost|127\.0\.0\.1|\[::1\])(?::\d+)?$}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_STORAGE=${RATE_LIMIT_STORAGE:-redis}
      - RATE_LIMIT_GENERAL_PER_MINUTE=${RATE_LIMIT_GENERAL_PER_MINUTE:-300}
      - RATE_LIMIT_ESP_PER_MINUTE=${RATE_LIMIT_ESP_PER_MINUTE:-1200}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - EXPOSE_API_DOCS=${EXPOSE_API_DOCS:-false}
      - EXPOSE_METRICS=${EXPOSE_METRICS:-false}
      - METRICS_TOKEN=${METRICS_TOKEN-}
      - METRICS_ALLOW_IPS=${METRICS_ALLOW_IPS:-127.0.0.1,::1,localhost}
      - ALLOW_ADMIN_API_KEY_BOOTSTRAP=${ALLOW_ADMIN_API_KEY_BOOTSTRAP:-false}
      - PUSH_NOTIFICATIONS_ENABLED=${PUSH_NOTIFICATIONS_ENABLED:-false}
      - PUSH_NOTIFICATION_COOLDOWN_SECONDS=${PUSH_NOTIFICATION_COOLDOWN_SECONDS:-300}
      - MONGO_PUSH_TOKENS_COLLECTION=${MONGO_PUSH_TOKENS_COLLECTION:-push_tokens}
      - FCM_PROJECT_ID=${FCM_PROJECT_ID-}
      - FCM_SERVICE_ACCOUNT_PATH=${FCM_SERVICE_ACCOUNT_PATH-}
      - FCM_SERVICE_ACCOUNT_JSON=${FCM_SERVICE_ACCOUNT_JSON-}
    ports:
      - "${BACKEND_BIND_IP:-127.0.0.1}:${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:2026.2.0
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles:
      - cloudflare

  cloudflared-quick:
    image: cloudflare/cloudflared:2026.2.0
    container_name: cloudflared-quick
    command: tunnel --no-autoupdate --url http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles:
      - cloudflare-quick

  nodered:
    image: nodered/node-red:4.1.7-debian
    container_name: nodered
    environment:
      - TZ=UTC
    ports:
      - "${NODERED_BIND_IP:-127.0.0.1}:${NODERED_HOST_PORT:-1880}:1880"
    volumes:
      - nodered_data:/data
    depends_on:
      mongodb:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1880/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    profiles:
      - tools

volumes:
  nodered_data:
  mongodb_data:
  mongodb_config:

