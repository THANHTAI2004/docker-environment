name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Compile backend
        working-directory: backend
        run: python -m compileall app

      - name: Run backend tests
        working-directory: backend
        env:
          API_KEY: ci-api-key
          ADMIN_API_KEY: ci-admin-api-key
          DEVICE_TOKEN_SECRET: ci-device-token-secret
          JWT_SECRET: ci-jwt-secret
          REFRESH_TOKEN_SECRET: ci-refresh-token-secret
          MONGO_URI: mongodb://admin:ci-password@mongodb:27017
          RATE_LIMIT_STORAGE: memory
        run: pytest tests -q

      - name: Optional dependency audit
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt

      - name: Build backend image
        run: docker build -t wearable-backend-ci ./backend
